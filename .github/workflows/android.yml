name: Android CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew --no-daemon clean assembleDebug --stacktrace --info | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: weight-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weight-build-log
          path: build.log
